appId: com.vivipet.app
productName: ViviPet
directories:
  output: release
  buildResources: .
files:
  - dist/**/*
  - assets/**/*
extraResources:
  - from: assets
    to: assets
  - from: public/models
    to: models
electronDist: ../../node_modules/electron/dist
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  icon: assets/icon.png
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
