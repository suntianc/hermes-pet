# ViviPet Hermes hook example
#
# Run this from the repository root, or replace the command with the absolute
# path to vivipet_adapter_hook.py when copying into ~/.hermes/config.yaml.
# Enable hooks_auto_accept: true in ~/.hermes/config.yaml if you want Hermes to
# auto accept these local hooks.

hooks:
  on_session_start:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5

  pre_tool_call:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5

  post_tool_call:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5

  pre_llm_call:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5

  post_llm_call:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5

  on_session_end:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5

  on_session_finalize:
    - command: "python3 source/example/hermes/vivipet_adapter_hook.py"
      timeout: 5
