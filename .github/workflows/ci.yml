# ViviPet CI 工作流
# 在推送到 main 或创建 PR 时触发：安装依赖 → 构建 → 上传构建产物
---
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "CLAUDE.md"
      - "DESIGN.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "CLAUDE.md"
      - "DESIGN.md"

# 同一分支的并发构建自动取消旧的任务
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# GitHub Actions 运行器将在 2026-06-02 起默认使用 Node 24
# 提前启用以避免 actions/*@v4 的弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build shared packages
        run: |
          npm run build -w packages/pet-action-dsl
          npm run build -w packages/shared

      - name: Build desktop app (main + renderer)
        run: npm run build -w apps/desktop
        env:
          # macOS CI 无签名证书时跳过代码签名检查
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: apps/desktop/dist/
          retention-days: 7
          if-no-files-found: error
